<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pagamento pendente — Faça seu Carimbo</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#F5F0E8;min-height:100vh;
  display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:#FDFBF7;border-radius:20px;padding:40px 32px;
  max-width:440px;width:100%;text-align:center;
  box-shadow:0 8px 40px rgba(27,58,92,.12)}
.ico{font-size:3rem;margin-bottom:16px}
h1{font-family:'Playfair Display',serif;font-size:1.5rem;color:#C9922A;margin-bottom:8px}
p{font-size:.9rem;color:#5A5040;line-height:1.6;margin-bottom:20px}
.info{background:#FFF8E1;border-radius:10px;padding:14px;
  font-size:.82rem;color:#5A5040;line-height:1.7;margin-bottom:20px}
</style>
</head>
<body>
<div class="card">
  <div class="ico">⏳</div>
  <h1>Pagamento em análise</h1>
  <p>Seu pagamento está sendo processado. Isso pode levar alguns minutos.</p>
  <div class="info">
    📧 Você receberá um e-mail assim que o pagamento for confirmado<br>
    📱 Dúvidas: WhatsApp <strong>(43) 99690-5591</strong>
  </div>
</div>
</body>
</html>
